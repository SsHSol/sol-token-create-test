<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Debug2 - Wallet Detection</title>
</head>
<body>
  <h2>钱包检测 Debug</h2>
  <pre id="log" style="background:#111;color:#0f0;padding:16px;border-radius:8px;font-size:13px;"></pre>
  <button id="testBtn" style="margin-top:12px;padding:8px 16px;">测试连接钱包</button>

  <script src="../buffer-polyfill.js"></script>
  <script src="rent-reclaim.js"></script>
  <script>
    const log = document.getElementById('log');
    function add(msg) { log.textContent += msg + '\n'; }

    add('=== 钱包环境检测 ===');
    add('phantom?: ' + (window.phantom ? (window.phantom.solana ? '✅ 可用' : '❌ 无 solana') : '❌ 未安装'));
    add('solana?: ' + (window.solana ? '✅ 可用' : '❌ 未安装'));
    add('okxwallet?: ' + (window.okxwallet ? '✅' : '❌'));
    add('backpack?: ' + (window.backpack ? '✅' : '❌'));
    add('solflare?: ' + (window.solflare ? '✅' : '❌'));
    add('connectWallet type: ' + typeof window.connectWallet);
    add('');

    document.getElementById('testBtn').onclick = async function() {
      add('=== 点击连接 ===');
      try {
        add('getProvider()...');
        const provider = (() => {
          if (window.phantom?.solana) return window.phantom.solana;
          if (window.solana) return window.solana;
          return null;
        })();
        add('provider: ' + (provider ? '✅' : '❌ null'));
        if (!provider) { add('❌ 未找到钱包'); return; }

        add('调用 provider.connect()...');
        const resp = await provider.connect();
        add('✅ 连接成功! 地址: ' + resp.publicKey.toString());
      } catch (e) {
        add('❌ 错误: ' + e.message);
        add('stack: ' + (e.stack || '').split('\n').slice(0,3).join('\n'));
      }
    };
  </script>
</body>
</html>
