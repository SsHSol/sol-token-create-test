<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Debug - Rent Reclaim</title>
</head>
<body>
  <h2>Debug 页</h2>
  <pre id="log"></pre>

  <script>
    const log = document.getElementById('log');
    function addLog(msg) { log.textContent += msg + '\n'; }

    window.onerror = function(msg, url, line) {
      addLog('❌ GLOBAL ERROR: ' + msg + ' (line ' + line + ')');
    };

    addLog('1. Loading buffer-polyfill...');
  </script>
  <script src="../buffer-polyfill.js"></script>
  <script>
    addLog('2. Buffer loaded: ' + (typeof globalThis.Buffer !== 'undefined'));
  </script>
  <script src="rent-reclaim.js" onerror="addLog('❌ FAILED to load rent-reclaim.js')" onload="addLog('3. rent-reclaim.js loaded OK')"></script>
  <script>
    setTimeout(() => {
      addLog('4. window.connectWallet: ' + typeof window.connectWallet);
      addLog('5. window.RentReclaim: ' + typeof window.RentReclaim);
      addLog('6. window.solanaWeb3: ' + typeof window.solanaWeb3);
      addLog('7. Done');
    }, 500);
  </script>
</body>
</html>
