<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolFabi - Solana Token Creator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0a0a1a 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 680px;
      width: 100%;
      padding: 20px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      padding: 30px 0 20px;
    }
    header h1 {
      font-size: 2.2em;
      background: linear-gradient(90deg, #9945FF, #14F195);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    header p {
      color: #8888aa;
      font-size: 0.95em;
      margin-top: 6px;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      backdrop-filter: blur(8px);
    }
    .card h2 {
      font-size: 1.1em;
      color: #ccccee;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card h2 .badge {
      font-size: 0.7em;
      background: rgba(153,69,255,0.3);
      padding: 2px 8px;
      border-radius: 8px;
      color: #9945FF;
    }
    label {
      display: block;
      font-size: 0.85em;
      color: #aaaacc;
      margin-bottom: 6px;
      margin-top: 14px;
    }
    label:first-child { margin-top: 0; }
    input[type="text"], input[type="number"], input[type="url"], select, textarea {
      width: 100%;
      padding: 10px 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-size: 0.95em;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #9945FF;
    }
    textarea {
      resize: vertical;
      min-height: 60px;
      font-family: monospace;
      font-size: 0.85em;
    }
    input[type="range"] {
      width: 100%;
      margin-top: 6px;
      accent-color: #9945FF;
    }
    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.8em;
      color: #8888aa;
      margin-top: 2px;
    }
    .decimals-value {
      text-align: center;
      font-size: 1.2em;
      color: #14F195;
      margin-top: 4px;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-row .info { flex: 1; }
    .toggle-row .info .title {
      font-size: 0.95em;
      color: #ddd;
    }
    .toggle-row .info .desc {
      font-size: 0.8em;
      color: #8888aa;
      margin-top: 2px;
    }
    .toggle {
      position: relative;
      width: 48px;
      height: 26px;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.15);
      border-radius: 26px;
      transition: 0.3s;
    }
    .toggle .slider::before {
      content: "";
      position: absolute;
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }
    .toggle input:checked + .slider { background: #9945FF; }
    .toggle input:checked + .slider::before { transform: translateX(22px); }
    .toggle input:disabled + .slider { opacity: 0.4; cursor: not-allowed; }
    .wallet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .wallet-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #ccc;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.8em;
    }
    .wallet-btn:hover {
      background: rgba(153,69,255,0.15);
      border-color: #9945FF;
    }
    .wallet-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .wallet-btn .wallet-icon { font-size: 1.8em; margin-bottom: 4px; }
    .wallet-btn .wallet-name { font-weight: 600; }
    .wallet-btn .wallet-status { font-size: 0.75em; color: #888; margin-top: 2px; }
    .wallet-btn.connected { border-color: #14F195; background: rgba(20,241,149,0.1); }
    .wallet-btn.connected .wallet-status { color: #14F195; }
    .primary-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #9945FF, #14F195);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 12px;
    }
    .primary-btn:hover { opacity: 0.9; }
    .primary-btn:active { transform: scale(0.98); }
    .primary-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .primary-btn.secondary { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); }
    .primary-btn.danger { background: linear-gradient(90deg, #ff4444, #cc2222); }
    .log-box {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px;
      height: 200px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 0.8em;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-box .log-info { color: #8888ff; }
    .log-box .log-success { color: #14F195; }
    .log-box .log-error { color: #ff4444; }
    .log-box .log-warning { color: #ffaa00; }
    .fee-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.9em;
      color: #FFD700;
    }
    .connection-status {
      text-align: center;
      font-size: 0.85em;
      color: #8888aa;
      padding: 4px 0;
    }
    .connection-status.connected { color: #14F195; }
    .connection-status.error { color: #ff4444; }
    .fee-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }
    .hidden { display: none !important; }
    .wallet-address {
      font-family: monospace;
      font-size: 0.75em;
      color: #8888aa;
      word-break: break-all;
      background: rgba(0,0,0,0.2);
      padding: 6px 10px;
      border-radius: 8px;
      margin-top: 8px;
    }
    footer {
      text-align: center;
      padding: 20px;
      color: #555577;
      font-size: 0.8em;
    }
    footer a { color: #7777aa; text-decoration: none; }
    footer a:hover { color: #9945FF; }
    @media (max-width: 480px) {
      .container { padding: 12px; }
      .card { padding: 16px; }
      header h1 { font-size: 1.6em; }
      .wallet-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🪙 SolFabi</h1>
      <p>Solana Token-2022 发币工具</p>
    </header>

    <!-- 钱包连接 -->
    <div class="card" id="wallet-section">
      <h2>🔌 连接钱包</h2>
      <div class="wallet-grid" id="wallet-grid">
        <button class="wallet-btn" data-wallet="phantom" onclick="TokenApp.connectWallet('phantom')">
          <span class="wallet-icon">👻</span>
          <span class="wallet-name">Phantom</span>
          <span class="wallet-status">未连接</span>
        </button>
        <button class="wallet-btn" data-wallet="okx" onclick="TokenApp.connectWallet('okx')">
          <span class="wallet-icon">🦊</span>
          <span class="wallet-name">OKX</span>
          <span class="wallet-status">未连接</span>
        </button>
        <button class="wallet-btn" data-wallet="backpack" onclick="TokenApp.connectWallet('backpack')">
          <span class="wallet-icon">🎒</span>
          <span class="wallet-name">Backpack</span>
          <span class="wallet-status">未连接</span>
        </button>
        <button class="wallet-btn" data-wallet="solflare" onclick="TokenApp.connectWallet('solflare')">
          <span class="wallet-icon">🔥</span>
          <span class="wallet-name">Solflare</span>
          <span class="wallet-status">未连接</span>
        </button>
        <button class="wallet-btn" data-wallet="trust" onclick="TokenApp.connectWallet('trust')">
          <span class="wallet-icon">🛡️</span>
          <span class="wallet-name">Trust</span>
          <span class="wallet-status">未连接</span>
        </button>
        <button class="wallet-btn" data-wallet="coinbase" onclick="TokenApp.connectWallet('coinbase')">
          <span class="wallet-icon">🔵</span>
          <span class="wallet-name">Coinbase</span>
          <span class="wallet-status">未连接</span>
        </button>
        <button class="wallet-btn" data-wallet="glow" onclick="TokenApp.connectWallet('glow')">
          <span class="wallet-icon">✨</span>
          <span class="wallet-name">Glow</span>
          <span class="wallet-status">未连接</span>
        </button>
        <button class="wallet-btn" data-wallet="exodus" onclick="TokenApp.connectWallet('exodus')">
          <span class="wallet-icon">🔺</span>
          <span class="wallet-name">Exodus</span>
          <span class="wallet-status">未连接</span>
        </button>
      </div>
      <div id="wallet-address" class="wallet-address hidden"></div>
      <div id="connection-status" class="connection-status">未连接钱包</div>
      <button class="primary-btn secondary" onclick="TokenApp.disconnectWallet()" id="disconnect-btn" style="display:none;">断开连接</button>
    </div>

    <!-- 代币信息 -->
    <div class="card" id="token-section">
      <h2>📝 代币信息 <span class="badge">Token-2022</span></h2>

      <label>代币名称 (Token Name)</label>
      <input type="text" id="token-name" placeholder="例如: MyToken" value="Test Token">

      <label>代币符号 (Symbol)</label>
      <input type="text" id="token-symbol" placeholder="例如: MTK" value="TEST">

      <label>代币图标 URI (可选)</label>
      <input type="url" id="token-uri" placeholder="https://example.com/icon.png">

      <label>代币描述 (可选)</label>
      <textarea id="token-description" placeholder="这是一款基于 Solana 的代币..."></textarea>

      <label>小数位数 (Decimals)</label>
      <input type="range" id="token-decimals" min="0" max="9" value="6" oninput="TokenApp.updateDecimals()">
      <div class="decimals-value" id="decimals-display">6</div>
      <div class="range-labels"><span>0 (整数)</span><span>9 (最大精度)</span></div>

      <label>初始供应量 (Initial Supply)</label>
      <input type="number" id="token-supply" value="1000000000" min="0" step="1">

      <label>推荐人钱包 (可选, 收 0.025 SOL 手续费)</label>
      <input type="text" id="referrer-wallet" placeholder="3XLxaz1TXbLAqQh5RhfbQW2AcEEGn7tKZTqf88ee8888">

      <label>自定义 Mint 账号 (可选, 留空自动生成)</label>
      <input type="text" id="custom-mint" placeholder="留空则自动生成新的 Mint 账号">

      <label>Memo (可选, 交易备注)</label>
      <input type="text" id="memo-text" placeholder="例如: Created by SolFabi">
    </div>

    <!-- 权限管理 -->
    <div class="card" id="revoke-section">
      <h2>🔐 权限管理</h2>

      <div class="toggle-row">
        <div class="info">
          <div class="title">放弃铸币权限</div>
          <div class="desc">发行后不能再增发代币</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="revoke-mint" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <div class="info">
          <div class="title">放弃冻结权限</div>
          <div class="desc">发行后不能再冻结/解冻账户</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="revoke-freeze" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <div class="info">
          <div class="title">放弃元数据修改权限</div>
          <div class="desc">发行后不能修改代币名称、符号和图标</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="revoke-metadata" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- 创建按钮 -->
    <div class="card">
      <button class="primary-btn" id="create-btn" onclick="TokenApp.createToken()" disabled>
        🚀 创建代币 (0.025 SOL)
      </button>
      <div class="fee-row">
        <span class="fee-badge">⛽ 矿工费约 0.005 SOL</span>
        <span class="fee-badge">💰 手续费 0.025 SOL</span>
      </div>
    </div>

    <!-- 日志 -->
    <div class="card">
      <h2>📋 运行日志</h2>
      <div class="log-box" id="log-box">等待操作...</div>
      <button class="primary-btn secondary" onclick="TokenApp.clearLog()" style="margin-top:8px;">清除日志</button>
    </div>

    <footer>
      <p>SolFabi · Built on Solana Token-2022 · <a href="https://github.com/SsHSol/sol-token-create" target="_blank">GitHub</a></p>
    </footer>
  </div>

  <!-- 主逻辑 bundle（包含所有依赖） -->
  <script src="bundle.js"></script>
</body>
</html>
